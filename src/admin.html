<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B2B2C Admin — Portal Management</title>
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>

  <!-- App root — admin.js populates this -->
  <div id="admin-app">
    <div class="admin-loading">
      <div class="admin-spinner"></div>
      <span>Memuat…</span>
    </div>
  </div>

  <!-- Toast stack — always available -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- Modal container — confirm() appends overlays here -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box" role="dialog" aria-modal="true">
      <h3 id="modal-title" class="modal-title"></h3>
      <p  id="modal-body"  class="modal-body"></p>
      <div id="modal-actions" class="modal-actions"></div>
    </div>
  </div>

  <!-- Panel overlay backdrop — used by openPanel() -->
  <div id="panel-overlay" class="panel-overlay hidden"></div>

  <script type="module" src="./admin.js"></script>
</body>
</html>
